<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark rounded square background -->
  <rect width="32" height="32" rx="8" fill="#0f1a2e"/>
  <!-- Chat bubble body -->
  <rect x="5" y="5" width="22" height="16" rx="4" fill="url(#g)"/>
  <!-- Chat bubble tail (bottom-left) -->
  <path d="M8 21 L5 28 L15 21 Z" fill="url(#g)"/>
  <!-- Three typing dots -->
  <circle cx="11" cy="13" r="1.6" fill="white" opacity="0.95"/>
  <circle cx="16" cy="13" r="1.6" fill="white" opacity="0.95"/>
  <circle cx="21" cy="13" r="1.6" fill="white" opacity="0.95"/>
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
  </defs>
</svg>
