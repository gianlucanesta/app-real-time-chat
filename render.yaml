services:
  # ──────────────────────────────────────────────
  # 1.  Static frontend (React + Vite + TypeScript)
  # ──────────────────────────────────────────────
  - type: web
    name: app-real-time-chat-frontend
    runtime: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://app-real-time-chat-backend.onrender.com/api

  # ──────────────────────────────────────────────
  # 2.  Node.js backend (Express + TypeScript)
  # ──────────────────────────────────────────────
  - type: web
    name: app-real-time-chat-backend
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install --include=dev && npm run build
    startCommand: node dist/index.js
    healthCheckPath: /api/health
    envVars:
      # PostgreSQL (Neon) — set manually in the Render dashboard
      # Copy the connection string from console.neon.tech → your project → Connection Details
      # Use the "pooled" connection string (port 5432, ?sslmode=require already included)
      - key: DATABASE_URL
        sync: false

      # Redis — auto-bound from the key-value store below
      - key: REDIS_URL
        fromService:
          name: app-real-time-chat-redis
          type: redis
          property: connectionString

      # MongoDB Atlas — set manually in the Render dashboard
      # (Render does not host MongoDB natively; use Atlas M0 free tier)
      - key: MONGO_URI
        sync: false

      # JWT secret — set manually in the Render dashboard
      - key: JWT_SECRET
        sync: false

      # Cloudinary — set manually in the Render dashboard
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

      # Runtime
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3001"

      # CORS — frontend URL on Render
      - key: ALLOWED_ORIGIN
        value: https://app-real-time-chat-frontend.onrender.com

      # Google OAuth2 — set client_id and client_secret manually in the Render dashboard
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_CALLBACK_URL
        value: https://app-real-time-chat-backend.onrender.com/api/auth/google/callback

      # Facebook OAuth2 — set app_id and app_secret manually in the Render dashboard
      - key: FACEBOOK_APP_ID
        sync: false
      - key: FACEBOOK_APP_SECRET
        sync: false
      - key: FACEBOOK_CALLBACK_URL
        value: https://app-real-time-chat-backend.onrender.com/api/auth/facebook/callback

      # Frontend URL (used for post-OAuth redirects)
      - key: CLIENT_URL
        value: https://app-real-time-chat-frontend.onrender.com

  # ──────────────────────────────────────────────
  # 3.  Docs site (Fumadocs / Next.js)
  # ──────────────────────────────────────────────
  - type: web
    name: app-real-time-chat-docs
    runtime: node
    plan: free
    rootDir: docs
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"

  # ──────────────────────────────────────────────
  # 4.  Render-managed Redis (Key-Value store)
  # ──────────────────────────────────────────────
  - type: redis
    name: app-real-time-chat-redis
    plan: free
    maxmemoryPolicy: noeviction
    ipAllowList: []

# No Render-managed PostgreSQL — using Neon (external serverless Postgres)
