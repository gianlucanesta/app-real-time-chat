services:
  # ──────────────────────────────────────────────
  # 1.  Static frontend (React + Vite + TypeScript)
  # ──────────────────────────────────────────────
  - type: web
    name: app-real-time-chat-frontend
    runtime: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      # Backend URL — set to your deployed backend URL after first deploy
      # e.g. https://app-real-time-chat-backend.onrender.com/api
      - key: VITE_API_URL
        sync: false

  # ──────────────────────────────────────────────
  # 2.  Node.js backend (Express + TypeScript)
  # ──────────────────────────────────────────────
  - type: web
    name: app-real-time-chat-backend
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install && npm run build
    startCommand: node dist/index.js
    healthCheckPath: /api/health
    envVars:
      # PostgreSQL — auto-bound from the database below
      - key: DATABASE_URL
        fromDatabase:
          name: app-real-time-chat-db
          property: connectionString

      # Redis — auto-bound from the key-value store below
      - key: REDIS_URL
        fromService:
          name: app-real-time-chat-redis
          type: redis
          property: connectionString

      # MongoDB Atlas — set manually in the Render dashboard
      # (Render does not host MongoDB natively; use Atlas M0 free tier)
      - key: MONGO_URI
        sync: false

      # JWT secret — set manually in the Render dashboard
      - key: JWT_SECRET
        sync: false

      # Cloudinary — set manually in the Render dashboard
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

      # Runtime
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3001"

      # CORS — update to match your deployed frontend URL after first deploy
      - key: ALLOWED_ORIGIN
        value: "*"

  # ──────────────────────────────────────────────
  # 3.  Adminer — PostgreSQL visual interface
  #     ⚠ publicly accessible: use only for dev/demo
  # ──────────────────────────────────────────────
  - type: web
    name: app-real-time-chat-adminer
    runtime: image
    plan: free
    image:
      url: docker.io/library/adminer:latest
    envVars:
      # Pre-fills the server field in the Adminer login form
      - key: ADMINER_DEFAULT_SERVER
        fromDatabase:
          name: app-real-time-chat-db
          property: host
      - key: ADMINER_DEFAULT_DB_DRIVER
        value: pgsql

  # ──────────────────────────────────────────────
  # 4.  Render-managed Redis (Key-Value store)
  # ──────────────────────────────────────────────
  - type: redis
    name: app-real-time-chat-redis
    plan: free
    maxmemoryPolicy: noeviction
    ipAllowList: []

# ──────────────────────────────────────────────
# 4.  Render-managed PostgreSQL
# ──────────────────────────────────────────────
databases:
  - name: app-real-time-chat-db
    databaseName: chat
    user: chat
    plan: free
